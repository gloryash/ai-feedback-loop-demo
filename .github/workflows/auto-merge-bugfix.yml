name: auto-merge AI PR

on:
  pull_request:
    types: [opened, synchronize, labeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'ai:autofix') || startsWith(github.event.pull_request.head.ref, 'ai/local/')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: gh pr merge "$PR_NUMBER" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
