name: AI autofix issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ai-autofix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  autofix:
    if: github.event.label.name == 'autofix:candidate'
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BRANCH_NAME: ai/issue-${{ github.event.issue.number }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create working branch
        run: git checkout -b "$BRANCH_NAME"

      - name: Capture issue context
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,labels,url,author \
            > .codex-issue-context.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.AI_PROXY_KEY }}
          responses-api-endpoint: ${{ secrets.AI_RESPONSES_ENDPOINT }}
          prompt-file: .github/codex/prompts/autofix.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Run tests
        run: npm test

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "ai-autofix-bot"
          git config user.email "ai-autofix-bot@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            gh issue comment "$ISSUE_NUMBER" --body "Codex ran but did not produce a code change."
            exit 0
          fi
          git commit -m "fix: resolve issue #$ISSUE_NUMBER"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"
          TYPE_LABEL="$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | grep -E '^(bug|feature|design)$' | head -n 1 || true)"
          if [ -n "$TYPE_LABEL" ]; then
            TYPE_LABEL_ARGS=(--label "$TYPE_LABEL")
          else
            TYPE_LABEL_ARGS=()
          fi
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --title "fix: resolve issue #$ISSUE_NUMBER" \
            --body "Closes #$ISSUE_NUMBER" \
            --label "ai:autofix" \
            "${TYPE_LABEL_ARGS[@]}"
