name: Temporary transfer AIPR proxy secrets

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Target repository owner"
        required: true
      target_repo:
        description: "Target repository name"
        required: true

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Transfer proxy secrets to target repo
        env:
          GH_TOKEN: ${{ secrets.AIPR_TARGET_REPO_SECRET_WRITE_TOKEN }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO_NAME: ${{ inputs.target_repo }}
          AI_PROXY_KEY: ${{ secrets.AI_PROXY_KEY }}
          AI_RESPONSES_ENDPOINT: ${{ secrets.AI_RESPONSES_ENDPOINT }}
        run: |
          set -euo pipefail

          target="${TARGET_OWNER}/${TARGET_REPO_NAME}"
          expected="SuperOPC-AI-Incubator/speaklow-macvoiceinput"
          if [[ "${target}" != "${expected}" ]]; then
            echo "Refusing to transfer secrets to unexpected target: ${target}" >&2
            exit 1
          fi

          missing=()
          [[ -n "${GH_TOKEN:-}" ]] || missing+=("AIPR_TARGET_REPO_SECRET_WRITE_TOKEN")
          [[ -n "${AI_PROXY_KEY:-}" ]] || missing+=("AI_PROXY_KEY")
          [[ -n "${AI_RESPONSES_ENDPOINT:-}" ]] || missing+=("AI_RESPONSES_ENDPOINT")
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing source secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          gh repo view "${target}" --json nameWithOwner --jq .nameWithOwner >/dev/null
          printf '%s' "${AI_PROXY_KEY}" | gh secret set AI_PROXY_KEY -R "${target}"
          printf '%s' "${AI_RESPONSES_ENDPOINT}" | gh secret set AI_RESPONSES_ENDPOINT -R "${target}"
          echo "Transferred secret names to ${target}: AI_PROXY_KEY AI_RESPONSES_ENDPOINT"
