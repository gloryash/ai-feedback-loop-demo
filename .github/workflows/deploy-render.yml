name: deploy Render

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data "{\"commitId\":\"${GITHUB_SHA}\"}"
          )"
          echo "$response" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s); console.log('Render deploy:', j.id || j.deploy?.id || 'created');})"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
