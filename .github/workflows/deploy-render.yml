name: deploy Render

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Detect source issue
        id: source
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          issueNumber="$(
            node -e "
              const message = process.env.HEAD_COMMIT_MESSAGE || '';
              const match = message.match(/(?:issue|closes) #([0-9]+)/i);
              process.stdout.write(match ? match[1] : '');
            "
          )"
          echo "issueNumber=${issueNumber}" >> "$GITHUB_OUTPUT"

      - name: Mark Render deploy starting
        if: steps.source.outputs.issueNumber != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.source.outputs.issueNumber }}
        run: |
          gh label create "local:deploying" --color "C2410C" --description "Render deployment is running" || true
          gh label create "local:deployed" --color "1F883D" --description "Render deployment succeeded" || true
          gh label create "local:deploy-failed" --color "B42318" --description "Render deployment failed or timed out" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "local:deploying"
          gh issue comment "$ISSUE_NUMBER" --body "Merged into main at ${GITHUB_SHA}. Render deploy is starting."

      - name: Trigger Render deploy
        id: render
        run: |
          response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data "{\"commitId\":\"${GITHUB_SHA}\"}"
          )"
          deployId="$(
            echo "$response" | node -e "
              let s='';
              process.stdin.on('data', d => s += d);
              process.stdin.on('end', () => {
                const payload = JSON.parse(s || '{}');
                process.stdout.write(payload.id || payload.deploy?.id || '');
              });
            "
          )"
          if [ -z "$deployId" ]; then
            echo "Render deploy response did not include a deploy id."
            echo "$response"
            exit 1
          fi
          echo "deploy_id=${deployId}" >> "$GITHUB_OUTPUT"
          echo "Render deploy: ${deployId}"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

      - name: Poll Render deploy
        id: poll
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.render.outputs.deploy_id }}
        run: |
          success_statuses=" live "
          failure_statuses=" build_failed update_failed canceled pre_deploy_failed deactivated failed "

          for attempt in {1..60}; do
            status="$(
              curl --fail-with-body --silent --show-error \
                --request GET \
                --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
                --header "Authorization: Bearer ${RENDER_API_KEY}" \
                --header "Accept: application/json" \
              | node -e "
                let s='';
                process.stdin.on('data', d => s += d);
                process.stdin.on('end', () => {
                  const payload = JSON.parse(s || '{}');
                  process.stdout.write(payload.status || 'unknown');
                });
              "
            )"

            echo "Render deploy ${DEPLOY_ID} status: ${status}"
            if [[ "$success_statuses" == *" ${status} "* ]]; then
              echo "status=${status}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$failure_statuses" == *" ${status} "* ]]; then
              echo "status=${status}" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep 10
          done

          echo "status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Mark Render deploy succeeded
        if: steps.source.outputs.issueNumber != '' && success()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.source.outputs.issueNumber }}
          DEPLOY_ID: ${{ steps.render.outputs.deploy_id }}
          DEPLOY_STATUS: ${{ steps.poll.outputs.status }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "local:deploying" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "local:deployed"
          gh issue comment "$ISSUE_NUMBER" --body "Render deploy ${DEPLOY_ID} is ${DEPLOY_STATUS}. Public demo should now include this change."

      - name: Mark Render deploy failed
        if: steps.source.outputs.issueNumber != '' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.source.outputs.issueNumber }}
          DEPLOY_ID: ${{ steps.render.outputs.deploy_id }}
          DEPLOY_STATUS: ${{ steps.poll.outputs.status }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "local:deploying" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "local:deploy-failed"
          gh issue comment "$ISSUE_NUMBER" --body "Render deploy ${DEPLOY_ID:-unknown} did not complete successfully. Final status: ${DEPLOY_STATUS:-unknown}."
