name: AI PR review

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'ai:review')
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Fetch PR refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.AI_PROXY_KEY }}
          responses-api-endpoint: ${{ secrets.AI_RESPONSES_ENDPOINT }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Review only the changes introduced by this PR.
            Focus on bugs, security concerns, missing tests, and risky behavior changes.
            Do not expose secrets.

  post-feedback:
    runs-on: ubuntu-latest
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
