name: Bug report
description: Report a reproducible bug.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app version, logs, or screenshots.
    validations:
      required: false
  - type: checkboxes
    id: autofix
    attributes:
      label: Autofix candidate
      options:
        - label: This is a small reproducible bug, not a feature request or design change.
          required: false
